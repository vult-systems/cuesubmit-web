services:
  cuesubmit-web:
    build: .
    container_name: cuesubmit-web
    restart: unless-stopped
    network_mode: host
    environment:
      - REST_GATEWAY_URL=http://127.0.0.1:8448
      - JWT_SECRET=your-production-secret-32chars
      - SESSION_SECRET=cuesubmit-session-secret-key-32ch
      - DATABASE_PATH=/app/data/cuesubmit.db
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:-admin123}
    volumes:
      - cuesubmit-data:/app/data

volumes:
  cuesubmit-data:
